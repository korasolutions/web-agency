<body data-page-lang="en" data-alt-es-url="/blog/" data-alt-en-url="/en/blog/">
    <div id="header-placeholder"></div>

    <main class="blog-page">
        <section class="blog-hero">
            <div class="container">
                <div class="blog-hero-content">
                    <span class="blog-badge">BLOG</span>
                    <h1>Ideas, guides and strategies to grow with web and AI</h1>
                    <p>Content designed for businesses that want to get more clients, improve processes and build a serious digital presence.</p>
                </div>
            </div>
        </section>

        <section class="blog-listing-section">
            <div class="container">
                <div class="blog-toolbar">
                    <input id="blog-search" type="search" placeholder="Search articles..." aria-label="Search articles">
                    <select id="blog-category">
                        <option value="all">All categories</option>
                        <option value="desarrollo-web">Web development</option>
                        <option value="seo">SEO</option>
                        <option value="automatizacion">Automation</option>
                        <option value="ia">AI</option>
                        <option value="negocios">Business</option>
                    </select>
                </div>

                <div id="blog-grid" class="blog-grid"></div>
                <div id="blog-empty" class="blog-empty" hidden>No articles match your search.</div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/js/i18n.js?v=5"></script>
    <script src="/js/script.js?v=5"></script>
    <script src="/js/blog-language-switch.js?v=1"></script>
